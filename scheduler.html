<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Summer Schedule</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body { background: #0A0A0A; font-family: 'Inter','Helvetica Neue',Arial,sans-serif; }
  .root { background: #0A0A0A; min-height: 100dvh; color: #F5F5F5; max-width: 480px; width: 100%; margin: 0 auto; display: flex; flex-direction: column; }
  input, textarea { font-size: 16px; }
  .header { background: #111; border-bottom: 1px solid #1A1A1A; padding: max(16px, env(safe-area-inset-top)) 20px 16px; display: flex; align-items: center; }
  .header-title { font-weight: 700; font-size: 15px; color: #F5F5F5; flex: 1; }
  .coach-link { background: transparent; border: none; color: #161616; font-size: 10px; cursor: pointer; }
  .body { flex: 1; padding: 20px 20px calc(48px + env(safe-area-inset-bottom)); display: flex; flex-direction: column; }
  .prog-wrap { display: flex; justify-content: space-between; margin-bottom: 8px; }
  .prog-item { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }
  .prog-dot { width: 8px; height: 8px; border-radius: 50%; background: #2A2A2A; }
  .prog-dot.active { background: #C8102E; }
  .prog-label { font-size: 9px; color: #5A5A5A; letter-spacing: .08em; text-transform: uppercase; }
  .prog-label.active { color: #C8102E; }
  .prog-track { height: 2px; background: #1A1A1A; border-radius: 2px; margin-bottom: 24px; overflow: hidden; }
  .prog-fill { height: 100%; background: #C8102E; border-radius: 2px; transition: width .3s ease; }
  .section { display: flex; flex-direction: column; gap: 20px; }
  .section-title { font-weight: 800; font-size: 22px; letter-spacing: -.02em; }
  .section-sub { font-size: 13px; color: #888; line-height: 1.5; }
  .fields { display: flex; flex-direction: column; gap: 16px; }
  .subsection-label { font-size: 10px; font-weight: 800; letter-spacing: .12em; color: #C8102E; text-transform: uppercase; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field-label { font-size: 11px; font-weight: 700; letter-spacing: .08em; color: #888; text-transform: uppercase; }
  .field-error { font-size: 11px; color: #C8102E; font-weight: 600; margin-top: 2px; }
  input, textarea { background: #111; border: 1px solid #222; border-radius: 8px; color: #F5F5F5; padding: 13px 14px; outline: none; width: 100%; font-family: inherit; }
  textarea { resize: none; line-height: 1.6; font-size: 14px; }
  .freq-grid { display: flex; flex-direction: column; gap: 8px; }
  .freq-btn { background: #111; border: 1px solid #222; border-radius: 10px; padding: 13px 14px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; width: 100%; color: #F5F5F5; text-align: left; }
  .freq-btn.active { background: #1A0608; border: 1.5px solid #C8102E; }
  .freq-label { font-weight: 700; font-size: 15px; }
  .freq-sub { font-size: 11px; color: #888; }
  .day-group { display: flex; flex-direction: column; gap: 6px; }
  .day-heading { font-size: 10px; font-weight: 800; letter-spacing: .1em; color: #777; text-transform: uppercase; padding: 2px 0; }
  .sess-btn { display: flex; align-items: center; gap: 12px; background: #111; border: 1px solid #222; border-radius: 10px; padding: 12px 14px; cursor: pointer; width: 100%; text-align: left; color: #F5F5F5; }
  .sess-btn.checked { background: #1A0608; border: 1.5px solid #C8102E; }
  .sess-btn.locked { opacity: 0.25; cursor: not-allowed; }
  .sess-btn.dimmed { opacity: 0.3; cursor: not-allowed; }
  .sess-full-tag { font-size: 10px; font-weight: 800; color: #555; letter-spacing: .06em; text-transform: uppercase; }
  .checkbox { width: 20px; height: 20px; border-radius: 5px; border: 1.5px solid #333; background: #0A0A0A; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .checkbox.checked { background: #C8102E; border-color: #C8102E; }
  .check-mark { color: #fff; font-size: 11px; font-weight: 900; }
  .sess-time { font-weight: 700; font-size: 15px; flex: 1; }
  .counter-pill { display: flex; align-items: center; justify-content: space-between; background: #111; border: 1px solid #1A1A1A; border-radius: 10px; padding: 10px 14px; }
  .counter-label { font-size: 13px; color: #888; }
  .counter-dots { display: flex; gap: 6px; }
  .counter-dot { width: 9px; height: 9px; border-radius: 50%; background: #2A2A2A; }
  .counter-dot.filled { background: #C8102E; }
  .weekend-title { font-size: 12px; font-weight: 800; letter-spacing: .1em; color: #C8102E; text-transform: uppercase; }
  .weekend-sub { font-size: 12px; color: #666; margin-top: 4px; }
  .weekend-day-label { font-size: 10px; font-weight: 800; letter-spacing: .1em; color: #777; text-transform: uppercase; padding: 4px 0 2px; }
  .reason-wrap { background: #0D0D0D; border: 1px solid #1A1A1A; border-radius: 10px; padding: 12px 14px; display: flex; flex-direction: column; gap: 8px; margin-top: 2px; }
  .reason-label { font-size: 10px; font-weight: 800; letter-spacing: .1em; color: #888; text-transform: uppercase; }
  .reason-row { display: flex; gap: 8px; }
  .reason-btn { flex: 1; background: #111; border: 1px solid #222; border-radius: 8px; padding: 10px; cursor: pointer; color: #aaa; font-size: 13px; font-weight: 700; text-align: center; }
  .reason-btn.active { background: #1A0608; border: 1.5px solid #C8102E; color: #fff; }
  .pending-badge { font-size: 10px; font-weight: 800; color: #F5A623; letter-spacing: .06em; text-transform: uppercase; }
  .none-section { background: #111; border: 1.5px dashed #C8102E44; border-radius: 12px; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
  .none-section-label { font-size: 11px; font-weight: 800; letter-spacing: .1em; color: #C8102E; text-transform: uppercase; }
  .none-section-text { font-size: 13px; color: #888; line-height: 1.5; }
  .none-toggle { background: #C8102E; border: none; border-radius: 8px; padding: 11px 16px; cursor: pointer; color: #fff; font-size: 13px; font-weight: 700; width: 100%; }
  .none-toggle.active { background: #222; color: #888; }
  .avail-wrap { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
  .avail-label { font-size: 11px; font-weight: 700; color: #888; letter-spacing: .06em; text-transform: uppercase; }
  .avail-note { font-size: 11px; color: #C8102E; font-weight: 600; }
  .nav-row { display: flex; gap: 10px; margin-top: 28px; }
  .btn-back { background: transparent; border: 1px solid #222; border-radius: 10px; color: #888; font-size: 14px; font-weight: 600; padding: 14px 18px; cursor: pointer; flex-shrink: 0; }
  .btn-next { flex: 1; background: #C8102E; border: none; border-radius: 10px; color: #fff; font-size: 15px; font-weight: 700; padding: 15px; cursor: pointer; }
  .btn-next.full { width: 100%; }
  .btn-next:disabled { opacity: 0.5; cursor: wait; }
  .review-card { background: #111; border: 1px solid #1A1A1A; border-radius: 12px; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
  .review-divider { height: 1px; background: #1A1A1A; margin: 2px 0; }
  .rrow { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; }
  .rrow-label { font-size: 12px; color: #666; flex-shrink: 0; }
  .rrow-val { font-size: 13px; font-weight: 600; color: #F5F5F5; text-align: right; }
  .review-chip { background: #1A0608; border: 1px solid #C8102E22; border-radius: 6px; padding: 6px 10px; font-size: 12px; font-weight: 600; color: #F5F5F5; }
  .review-chip-pending { background: #1A140A; border: 1px solid #F5A62333; border-radius: 6px; padding: 6px 10px; font-size: 12px; font-weight: 600; color: #F5F5F5; display: flex; flex-direction: column; gap: 3px; }
  .follow-badge { font-size: 11px; color: #C8102E; font-weight: 700; }
  .success-wrap { display: flex; flex-direction: column; gap: 14px; padding-top: 20px; text-align: center; }
  .success-icon { width: 56px; height: 56px; border-radius: 50%; background: #C8102E; color: #fff; font-size: 26px; font-weight: 900; display: flex; align-items: center; justify-content: center; margin: 0 auto; }
  .success-name { font-weight: 900; font-size: 28px; letter-spacing: -.02em; }
  .success-tag { color: #C8102E; font-weight: 700; font-size: 11px; letter-spacing: .1em; text-transform: uppercase; }
  .success-card { background: #111; border: 1px solid #1A1A1A; border-radius: 12px; padding: 16px; display: flex; flex-direction: column; gap: 10px; text-align: left; }
  .closing-block { display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 24px 12px 8px; text-align: center; }
  .closing-title { font-weight: 800; font-size: 17px; color: #F5F5F5; }
  .closing-text { font-size: 13px; color: #777; line-height: 1.7; max-width: 320px; }
  .closing-sign { font-size: 11px; color: #999; font-weight: 600; }
  .contact-banner { background: #111; border: 1px solid #1A1A1A; border-radius: 12px; padding: 14px 16px; display: flex; flex-direction: column; gap: 6px; }
  .contact-banner-label { font-size: 10px; font-weight: 800; letter-spacing: .1em; color: #555; text-transform: uppercase; }
  .contact-banner-text { font-size: 13px; color: #aaa; line-height: 1.5; }
  .sync-note { font-size: 11px; color: #555; text-align: center; padding: 8px; }
  .sync-note.err { color: #C8102E; }
  .coach-tabs { display: flex; border-bottom: 1px solid #1A1A1A; margin-bottom: 20px; }
  .coach-tab { flex: 1; padding: 12px 8px; font-size: 12px; font-weight: 700; color: #555; background: transparent; border: none; cursor: pointer; letter-spacing: .04em; text-transform: uppercase; border-bottom: 2px solid transparent; }
  .coach-tab.active { color: #C8102E; border-bottom-color: #C8102E; }
  .coach-stat-row { display: flex; gap: 10px; margin-bottom: 16px; }
  .coach-stat { flex: 1; background: #111; border: 1px solid #1A1A1A; border-radius: 10px; padding: 14px; display: flex; flex-direction: column; gap: 4px; }
  .coach-stat-num { font-weight: 900; font-size: 28px; color: #F5F5F5; }
  .coach-stat-num.amber { color: #F5A623; }
  .coach-stat-num.red { color: #C8102E; }
  .coach-stat-num.green { color: #4CAF50; }
  .coach-stat-label { font-size: 10px; color: #555; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; }
  .coach-block { background: #111; border: 1px solid #1A1A1A; border-radius: 12px; overflow: hidden; margin-bottom: 12px; }
  .coach-block-header { padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1A1A1A; gap: 10px; }
  .coach-block-name { font-weight: 700; font-size: 14px; }
  .coach-empty { padding: 24px 16px; font-size: 12px; color: #444; text-align: center; }
  .approve-row { display: flex; gap: 8px; padding: 12px 16px; }
  .approve-btn { flex: 1; padding: 11px; border-radius: 6px; font-size: 11px; font-weight: 800; cursor: pointer; letter-spacing: .04em; }
  .approve-btn.approve { background: #4CAF5022; color: #4CAF50; border: 1px solid #4CAF5044; }
  .approve-btn.deny { background: #C8102E22; color: #C8102E; border: 1px solid #C8102E44; }
  .approve-btn:disabled { opacity: 0.4; cursor: wait; }
  .status-badge { font-size: 10px; font-weight: 800; letter-spacing: .06em; text-transform: uppercase; padding: 3px 9px; border-radius: 20px; flex-shrink: 0; }
  .status-badge.pending { background: #F5A62322; color: #F5A623; border: 1px solid #F5A62344; }
  .status-badge.approved { background: #4CAF5022; color: #4CAF50; border: 1px solid #4CAF5044; }
  .status-badge.denied { background: #C8102E22; color: #C8102E; border: 1px solid #C8102E44; }
  .coach-detail { padding: 10px 16px; display: flex; flex-direction: column; gap: 5px; }
  .coach-detail-line { font-size: 12px; color: #aaa; }
  .coach-refresh { background: transparent; border: 1px solid #222; border-radius: 10px; color: #888; font-size: 13px; font-weight: 600; padding: 12px; cursor: pointer; width: 100%; margin-top: 4px; }
  .coach-pin-wrap { display: flex; flex-direction: column; gap: 14px; padding-top: 20px; }
  .pin-error { font-size: 12px; color: #C8102E; font-weight: 600; }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="root" id="app"></div>

<script>
// ── Config ──────────────────────────────────────────────────────
var WORKER_URL = "https://summer-snowflake-b830.lyloholdings.workers.dev";
var DB_ID = "02ceed5f45fb464ca4015a278e509732";
var COACH_PIN = "0109";

var WEEKDAY_SESSIONS = [
  { id: "sun_1130", day: "Sunday", time: "11:30 AM - 12:30 PM", max: 12 },
  { id: "sun_100",  day: "Sunday", time: "1:00 - 2:00 PM", max: 12 },
  { id: "sun_230",  day: "Sunday", time: "2:30 - 3:30 PM", max: 12 },
  { id: "mon_430", day: "Monday", time: "4:30 - 5:30 PM", max: 8 },
  { id: "mon_530", day: "Monday", time: "5:30 - 6:30 PM", max: 8 },
  { id: "tue_530", day: "Tuesday", time: "5:30 - 6:30 PM", max: 12 },
  { id: "wed_430", day: "Wednesday", time: "4:30 - 5:30 PM", max: 8 },
  { id: "wed_530", day: "Wednesday", time: "5:30 - 6:30 PM", max: 8 },
  { id: "wed_700", day: "Wednesday", time: "7:00 - 8:00 PM", max: 8 },
  { id: "thu_530", day: "Thursday", time: "5:30 - 6:30 PM", max: 12 },
  { id: "fri_430", day: "Friday", time: "4:30 - 5:30 PM", max: 8 },
  { id: "fri_530", day: "Friday", time: "5:30 - 6:30 PM", max: 8 }
];
// Saturday = optional Recovery only
var WEEKEND_SESSIONS = [
  { id: "sat_730", day: "Saturday", time: "7:30 - 9:00 AM", max: 12 },
  { id: "sat_900", day: "Saturday", time: "9:00 - 10:30 AM", max: 12 },
  { id: "sat_1030", day: "Saturday", time: "10:30 AM - 12:00 PM", max: 12 }
];
var FREQ_OPTIONS = [
  { id: "2x", label: "2x / week", sub: "Twice a week", max: 2 },
  { id: "3x", label: "3x / week", sub: "Three times a week", max: 3 },
  { id: "4x", label: "4x+ / week", sub: "Four or more times", max: 4 }
];
var DAY_ORDER = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday"];
var DAY_OFFSET = { Sunday:0, Monday:1, Tuesday:2, Wednesday:3, Thursday:4, Friday:5, Saturday:6 };

function labelFor(sess) { return sess.day + " " + sess.time; }
function chipLabel(sess) { return sess.day + " \u00B7 " + dateForDay(sess.day) + " \u00B7 " + sess.time; }

// The upcoming Sunday that starts the week they are scheduling.
// If today is Sunday, use today. Otherwise the coming Sunday.
function weekSunday() {
  var d = new Date();
  var day = d.getDay(); // 0 = Sunday
  var add = day === 0 ? 0 : (7 - day);
  d.setDate(d.getDate() + add);
  d.setHours(0,0,0,0);
  return d;
}
function weekOfLabel() {
  var s = weekSunday();
  return "Week of " + (s.getMonth()+1) + "/" + s.getDate() + "/" + String(s.getFullYear()).slice(2);
}
function dateForDay(dayName) {
  var s = weekSunday();
  var d = new Date(s);
  d.setDate(s.getDate() + (DAY_OFFSET[dayName] || 0));
  return (d.getMonth()+1) + "/" + d.getDate();
}

// ── State ───────────────────────────────────────────────────────
var state = {
  view: "form", step: 0, submitted: false, submitting: false, submitError: "",
  lastName: "", phoneLast4: "", currentFreq: "",
  weekdaySessions: [], weekendRequests: [], noneWork: false, availability: "",
  errors: {}, counts: {}, confirming: false,
  pin: "", pinError: false, coachUnlocked: false,
  coachTab: "pending", subs: [], loadingSubs: false, subsError: "", actioning: "",
  lookupLast: "", lookupPhone: "", lookupResult: null, lookingUp: false, lookupError: "", lookupDone: false
};

function getGreeting() {
  var h = new Date().getHours();
  if (h < 12) return "Manaia le taeao";
  if (h < 18) return "Manaia le aoauli";
  return "Manaia le po";
}
function freqOption() { return FREQ_OPTIONS.filter(function(f){return f.id===state.currentFreq;})[0]; }
function maxSessions() { var f = freqOption(); return f ? f.max : 4; }
function atMax() { return maxSessions() > 0 && state.weekdaySessions.length >= maxSessions(); }
function esc(s) { return String(s==null?"":s).replace(/[&<>"']/g, function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c];}); }

// ── Notion via Worker (correct contract) ────────────────────────
function notionRequest(notionUrl, method, body) {
  return fetch(WORKER_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ _notionUrl: notionUrl, _notionMethod: method, _notionBody: body || null })
  }).then(function(res){ return res.json(); });
}

function createSubmission(payload) {
  var props = {
    "Athlete Name": { title: [{ text: { content: payload.title } }] },
    "Training Frequency": { select: { name: payload.trainingFrequency } },
    "Weekday Sessions": { rich_text: [{ text: { content: payload.weekdaySessions || "" } }] },
    "Weekend Requests": { rich_text: [{ text: { content: payload.weekendRequests || "None" } }] },
    "Approval Status": { select: { name: payload.approvalStatus } },
    "Needs Follow Up": { checkbox: payload.needsFollowUp },
    "Week Of": { rich_text: [{ text: { content: payload.weekOf || "" } }] },
    "Availability Notes": { rich_text: [{ text: { content: payload.availabilityNotes || "" } }] },
    "Submitted At": { date: { start: payload.submittedAt } }
  };
  if (payload.weekendReason && payload.weekendReason !== "None") {
    props["Weekend Reason"] = { select: { name: payload.weekendReason } };
  }
  return notionRequest("https://api.notion.com/v1/pages", "POST", {
    parent: { database_id: DB_ID }, properties: props
  });
}

function fetchSubmissions() {
  return notionRequest(
    "https://api.notion.com/v1/databases/" + DB_ID + "/query", "POST",
    { page_size: 100, sorts: [{ property: "Submitted At", direction: "descending" }] }
  ).then(function(data){
    var results = (data && data.results) || [];
    return results.map(function(p){
      var pr = p.properties || {};
      function rt(x){ return (pr[x] && pr[x].rich_text && pr[x].rich_text[0] && pr[x].rich_text[0].plain_text) || ""; }
      function sel(x){ return (pr[x] && pr[x].select && pr[x].select.name) || ""; }
      return {
        pageId: p.id,
        title: (pr["Athlete Name"] && pr["Athlete Name"].title && pr["Athlete Name"].title[0] && pr["Athlete Name"].title[0].plain_text) || "Unknown",
        freqLabel: sel("Training Frequency"),
        weekdayText: rt("Weekday Sessions"),
        weekendText: rt("Weekend Requests"),
        weekendReason: sel("Weekend Reason"),
        approvalStatus: sel("Approval Status") || "N/A",
        noneWork: (pr["Needs Follow Up"] && pr["Needs Follow Up"].checkbox) || false,
        handled: (pr["Handled"] && pr["Handled"].checkbox) || false,
        weekOf: rt("Week Of"),
        availability: rt("Availability Notes"),
        submittedAt: (pr["Submitted At"] && pr["Submitted At"].date && pr["Submitted At"].date.start) || ""
      };
    });
  });
}

function updateApproval(pageId, status) {
  return notionRequest("https://api.notion.com/v1/pages/" + pageId, "PATCH", {
    properties: { "Approval Status": { select: { name: status } } }
  });
}

// Reduce to this week's submissions, newest per athlete (latest wins)
function thisWeekLatest(list) {
  var wk = weekOfLabel();
  var thisWeek = list.filter(function(s){ return s.weekOf === wk; });
  var seen = {};
  var out = [];
  // list is newest-first, so first occurrence per title is the latest
  thisWeek.forEach(function(s){
    var key = (s.title || "").toLowerCase();
    if (!seen[key]) { seen[key] = true; out.push(s); }
  });
  return out;
}

// Count how full each slot is from all submissions (substring match on labels)
function loadCounts() {
  fetchSubmissions().then(function(list){
    var scoped = thisWeekLatest(list);
    var counts = {};
    WEEKDAY_SESSIONS.concat(WEEKEND_SESSIONS).forEach(function(s){ counts[s.id] = 0; });
    scoped.forEach(function(sub){
      WEEKDAY_SESSIONS.forEach(function(s){ if (sub.weekdayText && sub.weekdayText.indexOf(labelFor(s)) >= 0) counts[s.id]++; });
      WEEKEND_SESSIONS.forEach(function(s){ if (sub.weekendText && sub.weekendText.indexOf(labelFor(s)) >= 0) counts[s.id]++; });
    });
    state.counts = counts;
    if (state.view === "form") render();
  }).catch(function(){ /* silent — form still works without live counts */ });
}

function isFull(sess) { return (state.counts[sess.id] || 0) >= sess.max; }

// ── Validation ──────────────────────────────────────────────────
function validate() {
  var e = {};
  if (state.step === 0) {
    if (!state.lastName.trim()) e.lastName = "Required";
    if (!/^\d{4}$/.test(state.phoneLast4)) e.phoneLast4 = "Enter the last 4 digits of your phone";
    if (!state.currentFreq) e.currentFreq = "Required";
  }
  if (state.step === 1) {
    if (!state.noneWork) {
      if (state.weekdaySessions.length === 0) e.weekdaySessions = "Pick your sessions or let us know below";
      else if (state.weekdaySessions.length !== maxSessions()) e.weekdaySessions = "You selected " + state.weekdaySessions.length + " of " + maxSessions() + " required sessions. Add or remove to match your frequency.";
    }
    if (state.noneWork && !state.availability.trim()) e.availability = "Tell us when you are available";
  }
  state.errors = e;
  return Object.keys(e).length === 0;
}

function submitForm() {
  if (!validate() || state.submitting) { render(); return; }
  state.submitting = true; state.submitError = ""; render();

  var weekdayText = WEEKDAY_SESSIONS.filter(function(s){return state.weekdaySessions.indexOf(s.id)>=0;})
    .map(function(s){return labelFor(s);}).join(", ");

  var recoveryText = state.weekendRequests.map(function(r){
    var sess = WEEKEND_SESSIONS.filter(function(s){return s.id===r.sessionId;})[0];
    return labelFor(sess) + " (Recovery)";
  });
  var weekendText = recoveryText.join(", ");
  var weekendReason = recoveryText.length ? "Recovery" : "None";

  createSubmission({
    title: state.lastName + " \u00B7 " + state.phoneLast4,
    trainingFrequency: freqOption() ? freqOption().label : "",
    weekdaySessions: weekdayText,
    weekendRequests: weekendText || "None",
    weekendReason: weekendReason,
    needsFollowUp: state.noneWork,
    availabilityNotes: state.availability || "",
    approvalStatus: weekendText ? "Pending" : "N/A",
    submittedAt: new Date().toISOString(),
    weekOf: weekOfLabel()
  }).then(function(res){
    state.submitting = false;
    if (res && res.object === "error") {
      state.submitError = "Notion says: " + (res.message || res.code || "unknown error");
    } else {
      state.submitted = true;
    }
    render();
  }).catch(function(){
    state.submitting = false;
    state.submitError = "Could not send. Check your connection and try again.";
    render();
  });
}

function resetForm() {
  state.step = 0; state.submitted = false; state.submitError = "";
  state.lastName = ""; state.phoneLast4 = ""; state.currentFreq = "";
  state.weekdaySessions = []; state.weekendRequests = [];
  state.noneWork = false; state.availability = ""; state.errors = {}; state.confirming = false;
  render();
}

// ── Coach ───────────────────────────────────────────────────────
function runLookup() {
  if (!state.lookupLast.trim() || !/^\d{4}$/.test(state.lookupPhone)) {
    state.lookupError = "Enter your last name and last 4 of your phone."; render(); return;
  }
  state.lookingUp = true; state.lookupError = ""; state.lookupResult = null; state.lookupDone = false; render();
  var key = (state.lookupLast.trim() + " \u00B7 " + state.lookupPhone).toLowerCase();
  fetchSubmissions().then(function(list){
    // this week only, newest first already, find match
    var wk = weekOfLabel();
    var scoped = list.filter(function(s){ return s.weekOf === wk; });
    var match = scoped.filter(function(s){ return (s.title || "").toLowerCase() === key; })[0];
    state.lookingUp = false; state.lookupDone = true; state.lookupResult = match || null; render();
  }).catch(function(){
    state.lookingUp = false; state.lookupError = "Could not check right now. Try again in a moment."; render();
  });
}

function coachLogin() {
  if (state.pin === COACH_PIN) { state.pinError = false; state.coachUnlocked = true; state.view = "coach"; loadSubs(); }
  else { state.pinError = true; render(); }
}
function loadSubs() {
  state.loadingSubs = true; state.subsError = ""; render();
  fetchSubmissions().then(function(list){
    state.subs = list; state.loadingSubs = false; render();
  }).catch(function(){
    state.loadingSubs = false; state.subsError = "Could not load from Notion. Check the Worker."; render();
  });
}
function approve(pageId, status) {
  state.actioning = pageId + status; render();
  updateApproval(pageId, status).then(function(){
    state.subs = state.subs.map(function(s){ return s.pageId===pageId ? Object.assign({}, s, {approvalStatus: status}) : s; });
    state.actioning = ""; render();
  }).catch(function(){
    state.actioning = ""; alert("Update failed. Check connection and try again."); render();
  });
}
function markHandled(pageId, handled) {
  state.actioning = pageId + "handled"; render();
  notionRequest("https://api.notion.com/v1/pages/" + pageId, "PATCH", {
    properties: { "Handled": { checkbox: handled } }
  }).then(function(){
    state.subs = state.subs.map(function(s){ return s.pageId===pageId ? Object.assign({}, s, {handled: handled}) : s; });
    state.actioning = ""; render();
  }).catch(function(){
    state.actioning = ""; alert("Update failed. Check connection and try again."); render();
  });
}

// ── Render ──────────────────────────────────────────────────────
function render() {
  var app = document.getElementById("app");
  if (state.view === "lookup") { app.innerHTML = renderLookup(); bindLookup(); return; }
  if (state.view === "coach_pin") { app.innerHTML = renderPin(); bindPin(); return; }
  if (state.view === "coach") { app.innerHTML = renderCoach(); bindCoach(); return; }
  if (state.submitted) { app.innerHTML = renderSuccess(); bindSuccess(); return; }
  app.innerHTML = renderForm(); bindForm();
}

function renderLookup() {
  var html = '<div class="header"><div class="header-title" style="flex:1">My Schedule</div>'
    + '<button id="lookupExit" style="background:transparent;border:none;color:#888;font-size:11px;cursor:pointer;font-weight:600">Back</button></div><div class="body">';
  html += '<div class="section"><div class="section-title">Check Your Schedule</div>'
    + '<div class="section-sub">Enter your info to see what you are signed up for and the status of any weekend request.</div>'
    + '<div class="fields">'
    + '<div class="field"><div class="field-label">Last Name</div>'
    + '<input id="lookupLast" placeholder="Last name" value="' + esc(state.lookupLast) + '"></div>'
    + '<div class="field"><div class="field-label">Last 4 of your phone</div>'
    + '<input id="lookupPhone" inputmode="numeric" maxlength="4" placeholder="1234" value="' + esc(state.lookupPhone) + '"></div>'
    + (state.lookupError ? '<div class="field-error">' + state.lookupError + '</div>' : '')
    + '<button class="btn-next full" id="lookupBtn"' + (state.lookingUp?' disabled':'') + '>' + (state.lookingUp?'Checking...':'Check My Schedule') + '</button>';

  if (state.lookupDone && !state.lookupResult) {
    html += '<div class="coach-empty">No schedule found for that name and number. Double check, or fill out the form to sign up.</div>';
  }
  if (state.lookupResult) {
    var r = state.lookupResult;
    html += '<div class="review-card" style="margin-top:8px">'
      + '<div class="rrow"><span class="rrow-label">Frequency</span><span class="rrow-val">' + esc(r.freqLabel) + '</span></div>'
      + '<div class="review-divider"></div>';
    if (r.noneWork) {
      html += '<div class="coach-detail-line" style="color:#C8102E;font-weight:700">Coach will reach out about your availability.</div>';
    } else {
      if (r.weekdayText) r.weekdayText.split(", ").forEach(function(t){ html += '<div class="review-chip">' + esc(t) + '</div>'; });
      if (r.weekendText && r.weekendText !== "None") {
        var badge = r.approvalStatus === "Approved" ? '<span class="status-badge approved">Approved</span>'
          : r.approvalStatus === "Denied" ? '<span class="status-badge denied">Denied</span>'
          : '<span class="status-badge pending">Pending</span>';
        html += '<div class="review-chip-pending"><span>' + esc(r.weekendText) + '</span><div>' + badge + '</div></div>';
      }
    }
    html += '</div>';
    if (r.weekendText && r.weekendText !== "None" && r.approvalStatus === "Denied") {
      html += '<div class="none-section-text" style="text-align:center;margin-top:4px">Your weekend request was not approved. Reach out to Coach Fonoti to work something out.</div>';
    }
  }
  html += '</div></div></div>';

}
function bindLookup() {
  var ll = document.getElementById("lookupLast"); if (ll) ll.oninput = function(){ state.lookupLast = this.value; };
  var lp = document.getElementById("lookupPhone"); if (lp) lp.oninput = function(){ state.lookupPhone = this.value.replace(/\D/g,"").slice(0,4); };
  var lb = document.getElementById("lookupBtn"); if (lb) lb.onclick = runLookup;
  var ex = document.getElementById("lookupExit"); if (ex) ex.onclick = function(){ state.view = "form"; state.lookupResult = null; state.lookupDone = false; state.lookupError = ""; render(); };
}

function renderPin() {
  return '<div class="header"><div class="header-title" style="flex:1">Coach Access</div>'
    + '<button id="pinExit" style="background:transparent;border:none;color:#888;font-size:11px;cursor:pointer;font-weight:600">Back to Form</button></div><div class="body">'
    + '<div class="coach-pin-wrap"><div class="field"><div class="field-label">PIN</div>'
    + '<input id="pinInput" type="password" placeholder="Enter PIN" value="' + esc(state.pin) + '">'
    + (state.pinError ? '<div class="pin-error">Wrong PIN. Try again.</div>' : '') + '</div>'
    + '<div class="nav-row"><button class="btn-back" id="pinBack">Back to Form</button>'
    + '<button class="btn-next" id="pinEnter">Enter</button></div></div></div>';
}

function renderFollowItem(s) {
  var acting = state.actioning === s.pageId + "handled";
  var reason = s.noneWork
    ? 'Schedule does not fit: ' + esc(s.availability)
    : 'Denied: ' + esc(s.weekendText);
  return '<div class="coach-block" style="' + (s.handled ? 'opacity:.5' : '') + '"><div class="coach-block-header">'
    + '<div style="display:flex;flex-direction:column;gap:2px"><span class="coach-block-name">' + esc(s.title) + '</span>'
    + '<span style="font-size:11px;color:' + (s.noneWork ? '#C8102E' : '#F5A623') + ';font-weight:600">' + reason + '</span></div>'
    + '<span style="font-size:10px;color:#444">' + (s.submittedAt ? new Date(s.submittedAt).toLocaleDateString() : "") + '</span></div>'
    + '<div class="approve-row"><button class="approve-btn ' + (s.handled ? 'deny' : 'approve') + '" data-handled="' + s.pageId + '" data-hval="' + (s.handled ? '0' : '1') + '"' + (acting ? ' disabled' : '') + '>'
    + (acting ? '...' : (s.handled ? 'Reopen' : 'Mark Handled')) + '</button></div></div>';
}

function renderCoach() {
  var subs = thisWeekLatest(state.subs);
  var pending = subs.filter(function(s){ return s.weekendText && s.weekendText !== "None" && s.approvalStatus === "Pending"; });
  var resolved = subs.filter(function(s){ return s.weekendText && s.weekendText !== "None" && (s.approvalStatus === "Approved" || s.approvalStatus === "Denied"); });
  var follow = subs.filter(function(s){ return (s.noneWork || s.approvalStatus === "Denied") && !s.handled; });

  var html = '<div class="header"><div class="header-title" style="flex:1">Coach Dashboard</div>'
    + '<button id="coachExit" style="background:transparent;border:none;color:#555;font-size:11px;cursor:pointer;font-weight:600">Exit</button></div>'
    + '<div class="body">';
  html += '<div style="font-size:11px;color:#666;font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:12px">' + weekOfLabel() + '</div>';
  html += '<div class="coach-stat-row">'
    + '<div class="coach-stat"><div class="coach-stat-num">' + subs.length + '</div><div class="coach-stat-label">Submitted</div></div>'
    + '<div class="coach-stat"><div class="coach-stat-num' + (pending.length?' amber':' green') + '">' + pending.length + '</div><div class="coach-stat-label">Pending</div></div>'
    + '<div class="coach-stat"><div class="coach-stat-num' + (follow.length?' red':'') + '">' + follow.length + '</div><div class="coach-stat-label">Follow-Up</div></div>'
    + '</div>';
  html += '<div class="coach-tabs">';
  [["pending","Pending"],["roster","Roster"],["followup","Follow-Up"]].forEach(function(t){
    html += '<button class="coach-tab' + (state.coachTab===t[0]?' active':'') + '" data-tab="' + t[0] + '">' + t[1] + '</button>';
  });
  html += '</div>';

  if (state.loadingSubs) html += '<div class="sync-note">Loading from Notion...</div>';
  if (state.subsError) html += '<div class="sync-note err">' + state.subsError + '</div>';

  if (!state.loadingSubs && state.coachTab === "pending") {
    if (!pending.length) html += '<div class="coach-empty">No pending weekend requests.</div>';
    pending.forEach(function(s){
      var acA = state.actioning === s.pageId + "Approved";
      var acD = state.actioning === s.pageId + "Denied";
      html += '<div class="coach-block"><div class="coach-block-header">'
        + '<div style="display:flex;flex-direction:column;gap:2px"><span class="coach-block-name">' + esc(s.title) + '</span>'
        + '<span style="font-size:11px;color:#aaa">' + esc(s.weekendText) + '</span></div>'
        + '<span class="status-badge pending">' + esc(s.weekendReason || "Pending") + '</span></div>'
        + '<div class="approve-row">'
        + '<button class="approve-btn approve" data-approve="' + s.pageId + '"' + (acA?' disabled':'') + '>' + (acA?'...':'Approve') + '</button>'
        + '<button class="approve-btn deny" data-deny="' + s.pageId + '"' + (acD?' disabled':'') + '>' + (acD?'...':'Deny') + '</button>'
        + '</div></div>';
    });
    if (resolved.length) {
      html += '<div class="subsection-label" style="margin:8px 0">Resolved</div>';
      resolved.forEach(function(s){
        html += '<div class="coach-block"><div class="coach-block-header">'
          + '<div style="display:flex;flex-direction:column;gap:2px"><span class="coach-block-name">' + esc(s.title) + '</span>'
          + '<span style="font-size:11px;color:#aaa">' + esc(s.weekendText) + '</span></div>'
          + '<span class="status-badge ' + s.approvalStatus.toLowerCase() + '">' + esc(s.approvalStatus) + '</span></div></div>';
      });
    }
  }

  if (!state.loadingSubs && state.coachTab === "roster") {
    if (!subs.length) html += '<div class="coach-empty">No submissions yet.</div>';
    subs.forEach(function(s){
      var detail = "";
      if (s.noneWork) detail = '<span class="coach-detail-line" style="color:#C8102E;font-weight:700">Needs Follow-Up: ' + esc(s.availability) + '</span>';
      else {
        if (s.weekdayText) detail += '<span class="coach-detail-line">' + esc(s.weekdayText) + '</span>';
        if (s.weekendText && s.weekendText !== "None") detail += '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap"><span class="coach-detail-line">' + esc(s.weekendText) + '</span><span class="status-badge ' + s.approvalStatus.toLowerCase() + '">' + esc(s.approvalStatus) + '</span></div>';
      }
      html += '<div class="coach-block"><div class="coach-block-header">'
        + '<div style="display:flex;flex-direction:column;gap:2px"><span class="coach-block-name">' + esc(s.title) + '</span>'
        + '<span style="font-size:11px;color:#555">' + esc(s.freqLabel) + '</span></div>'
        + '<span style="font-size:10px;color:#444">' + (s.submittedAt ? new Date(s.submittedAt).toLocaleDateString() : "") + '</span></div>'
        + '<div class="coach-detail">' + detail + '</div></div>';
    });
  }

  if (!state.loadingSubs && state.coachTab === "followup") {
    // Follow-up = schedule-doesn't-fit flags + denied weekend requests
    var followItems = subs.filter(function(s){ return s.noneWork || (s.approvalStatus === "Denied"); });
    var open = followItems.filter(function(s){ return !s.handled; });
    var done = followItems.filter(function(s){ return s.handled; });
    if (!followItems.length) html += '<div class="coach-empty">No follow-ups needed.</div>';
    open.forEach(function(s){ html += renderFollowItem(s); });
    if (done.length) {
      html += '<div class="subsection-label" style="margin:8px 0">Handled</div>';
      done.forEach(function(s){ html += renderFollowItem(s); });
    }
  }

  html += '<button class="coach-refresh" id="coachRefresh">Refresh from Notion</button></div>';
  return html;
}

    if (state.noneWork) {
      html += '<div class="avail-wrap"><div class="avail-label">When is your athlete available?</div>'
        + '<textarea id="availability" rows="3" placeholder="e.g. Weekdays after 6pm, Saturday mornings">' + esc(state.availability) + '</textarea>'
        + (state.errors.availability ? '<div class="field-error">' + state.errors.availability + '</div>' : '')
        + '<div class="avail-note">Coach Fonoti will personally follow up.</div></div>';
    }
    html += '</div></div></div>';
  }

  if (state.step === 2) {
    var wd = WEEKDAY_SESSIONS.filter(function(s){return state.weekdaySessions.indexOf(s.id)>=0;});
    html += '<div class="section"><div class="section-title">Review and Submit</div>'
      + '<div class="section-sub">Make sure everything looks right.</div><div class="review-card">'
      + '<div class="rrow"><span class="rrow-label">Last Name</span><span class="rrow-val">' + esc(state.lastName) + '</span></div>'
      + '<div class="rrow"><span class="rrow-label">Frequency</span><span class="rrow-val">' + esc(f?f.label:"") + '</span></div>'
      + '<div class="review-divider"></div>';
    if (state.noneWork) html += '<div class="rrow"><span class="rrow-label">Availability</span><span class="rrow-val">' + esc(state.availability) + '</span></div>';
    else {
      html += wd.map(function(s){return '<div class="review-chip">' + esc(chipLabel(s)) + '</div>';}).join("");
      html += state.weekendRequests.map(function(r){
        var sess = WEEKEND_SESSIONS.filter(function(s){return s.id===r.sessionId;})[0];
        return '<div class="review-chip-pending"><span>' + esc(chipLabel(sess)) + '</span>'
          + '<div style="display:flex;align-items:center;gap:8px"><span style="font-size:10px;color:#F5A623;font-weight:700">Recovery</span>'
          + '<span class="pending-badge">Pending Approval</span></div></div>';
      }).join("");
    }
    if (state.noneWork) html += '<div class="follow-badge">Flagged for follow-up</div>';
    html += '</div>';
    if (state.confirming) html += '<div style="text-align:center;font-size:13px;color:#F5A623;font-weight:700;margin-top:4px">Double check everything above. Ready to lock it in?</div>';
    if (state.submitError) html += '<div class="field-error" style="text-align:center">' + state.submitError + '</div>';
    html += '</div>';
  }

  html += '<div class="nav-row">';
  if (state.step > 0) html += '<button class="btn-back" id="backBtn">Back</button>';
  if (state.step < 2) html += '<button class="btn-next' + (state.step===0?' full':'') + '" id="nextBtn">Next</button>';
  else if (state.confirming) {
    html += '<button class="btn-back" id="cancelSubmit">Go Back</button>'
      + '<button class="btn-next" id="confirmSubmit"' + (state.submitting?' disabled':'') + '>' + (state.submitting?'Sending...':'Yes, Submit') + '</button>';
  }
  else html += '<button class="btn-next" id="submitBtn">Submit</button>';
  html += '</div></div>';
  return html;
}

// ── Bindings ────────────────────────────────────────────────────
function bindForm() {
  var ln = document.getElementById("lastName");
  if (ln) ln.oninput = function(){ state.lastName = this.value; };
  var p4 = document.getElementById("phoneLast4");
  if (p4) p4.oninput = function(){ state.phoneLast4 = this.value.replace(/\D/g,"").slice(0,4); };
  var av = document.getElementById("availability");
  if (av) av.oninput = function(){ state.availability = this.value; };

  each("[data-freq]", function(btn){ btn.onclick = function(){ state.currentFreq = this.getAttribute("data-freq"); state.weekdaySessions = []; delete state.errors.currentFreq; render(); }; });
  each("[data-weekday]", function(btn){ btn.onclick = function(){
    if (state.noneWork) return;
    var id = this.getAttribute("data-weekday");
    var sess = WEEKDAY_SESSIONS.filter(function(s){return s.id===id;})[0];
    var has = state.weekdaySessions.indexOf(id) >= 0;
    if (!has && (atMax() || isFull(sess))) return;
    if (has) state.weekdaySessions = state.weekdaySessions.filter(function(s){return s!==id;});
    else state.weekdaySessions.push(id);
    delete state.errors.weekdaySessions; render();
  }; });
  each("[data-weekend]", function(btn){ btn.onclick = function(){
    var id = this.getAttribute("data-weekend");
    var sess = WEEKEND_SESSIONS.filter(function(s){return s.id===id;})[0];
    var exists = state.weekendRequests.filter(function(r){return r.sessionId===id;})[0];
    if (!exists && isFull(sess)) return;
    if (exists) state.weekendRequests = state.weekendRequests.filter(function(r){return r.sessionId!==id;});
    else state.weekendRequests.push({ sessionId: id, reason: "Recovery" });
    render();
  }; });
  var nt = document.getElementById("noneToggle");
  if (nt) nt.onclick = function(){ state.noneWork = !state.noneWork; if (state.noneWork) state.weekdaySessions = []; delete state.errors.weekdaySessions; delete state.errors.availability; render(); };
  var back = document.getElementById("backBtn"); if (back) back.onclick = function(){ state.step--; render(); };
  var next = document.getElementById("nextBtn"); if (next) next.onclick = function(){ if (validate()) state.step++; render(); };
  var submit = document.getElementById("submitBtn"); if (submit) submit.onclick = function(){ if (validate()) { state.confirming = true; render(); } else render(); };
  var confirmBtn = document.getElementById("confirmSubmit"); if (confirmBtn) confirmBtn.onclick = submitForm;
  var cancelBtn = document.getElementById("cancelSubmit"); if (cancelBtn) cancelBtn.onclick = function(){ state.confirming = false; render(); };
  var ce = document.getElementById("coachEnter"); if (ce) ce.onclick = function(){ state.view = "coach_pin"; render(); };
  var ms = document.getElementById("mySchedule"); if (ms) ms.onclick = function(){ state.view = "lookup"; state.lookupResult = null; state.lookupDone = false; state.lookupError = ""; render(); };
}
function bindSuccess() {
  var so = document.getElementById("startOver"); if (so) so.onclick = resetForm;
  var ce = document.getElementById("coachEnterSuccess"); if (ce) ce.onclick = function(){ state.submitted = false; state.view = "coach_pin"; render(); };
}
function bindPin() {
  var pi = document.getElementById("pinInput");
  if (pi) pi.oninput = function(){ state.pin = this.value; };
  if (pi) pi.onkeydown = function(e){ if (e.key === "Enter") coachLogin(); };
  function backToForm(){ state.pin=""; state.pinError=false; state.view="form"; state.submitted=false; state.step=0; render(); }
  var b = document.getElementById("pinBack"); if (b) b.onclick = backToForm;
  var ex = document.getElementById("pinExit"); if (ex) ex.onclick = backToForm;
  var en = document.getElementById("pinEnter"); if (en) en.onclick = coachLogin;
}
function bindCoach() {
  each("[data-tab]", function(btn){ btn.onclick = function(){ state.coachTab = this.getAttribute("data-tab"); render(); }; });
  each("[data-approve]", function(btn){ btn.onclick = function(){ approve(this.getAttribute("data-approve"), "Approved"); }; });
  each("[data-deny]", function(btn){ btn.onclick = function(){ approve(this.getAttribute("data-deny"), "Denied"); }; });
  each("[data-handled]", function(btn){ btn.onclick = function(){ markHandled(this.getAttribute("data-handled"), this.getAttribute("data-hval") === "1"); }; });
  var ex = document.getElementById("coachExit"); if (ex) ex.onclick = function(){ state.pin=""; state.view="form"; state.submitted=false; state.step=0; render(); };
  var rf = document.getElementById("coachRefresh"); if (rf) rf.onclick = loadSubs;
}
function each(sel, fn) { Array.prototype.forEach.call(document.querySelectorAll(sel), fn); }

render();
loadCounts();
</script>
</body>
</html>
