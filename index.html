<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<link rel="manifest" href="/manifest.json"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="FWAY"/>
<meta name="theme-color" content="#09090E"/>
<link rel="apple-touch-icon" href="/icon-192.png"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,minimum-scale=1.0,user-scalable=no,viewport-fit=cover,interactive-widget=resizes-content"/>
<title>Fonoti Way Performance</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
html,body{height:100%;background:#1a1a1a;color:#F0EDE6;font-family:'Barlow',sans-serif;overscroll-behavior:none;overflow:hidden;-webkit-font-smoothing:antialiased;-webkit-user-select:none;user-select:none}
button{cursor:pointer;font-family:inherit;border:none;outline:none;background:none;transition:opacity 0.1s,transform 0.1s;touch-action:manipulation}
button:active{opacity:0.75;transform:scale(0.97)}
input,textarea,select{font-size:16px!important;font-family:inherit;touch-action:manipulation;-webkit-user-select:auto;user-select:auto}
::-webkit-scrollbar{display:none}
*{-ms-overflow-style:none;scrollbar-width:none}
#app{height:100vh;width:100%;max-width:430px;margin:0 auto;display:flex;flex-direction:column;position:relative;background:#09090E;box-shadow:0 0 60px rgba(0,0,0,0.8)}
.screen{display:none;flex-direction:column;height:100vh;overflow:hidden}
.screen.active{display:flex;animation:sIn 0.18s ease}
@keyframes sIn{from{opacity:0.7;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.hdr{padding:max(12px,env(safe-area-inset-top)) 16px 12px;border-bottom:1px solid #1E1E2E;display:flex;align-items:center;justify-content:space-between;background:#09090E;z-index:50;flex-shrink:0}
.hdr-title{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;letter-spacing:0.1em}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px 16px 120px;min-height:0}
.bnav{position:fixed;bottom:0;left:0;right:0;background:#0C0C14;border-top:1px solid #1E1E2E;display:flex;z-index:200;height:64px;flex-shrink:0}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border:none;background:none;cursor:pointer;border-top:2px solid transparent;color:#9A9AB0;font-size:7px;font-family:'Barlow',sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:0.05em}
.bnav-btn.active{border-top-color:#DC2626;color:#DC2626}
.bnav-btn .icon{font-size:15px;opacity:0.5}
.bnav-btn.active .icon{font-size:18px;opacity:1}
.card{background:#13131E;border:1px solid #252538;border-radius:13px;padding:13px 14px}
.kp-btn{width:64px;height:64px;border-radius:50%;background:#1C1C2E;border:1px solid #303050;color:#F0EDE6;font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;margin:auto}
.pin-dot{width:18px;height:18px;border-radius:50%;background:transparent;border:2px solid #303050;transition:all 0.15s;}
.pin-dot.filled{background:#DC2626;border-color:#DC2626;}
.btn-red{width:100%;background:#DC2626;color:#fff;border:none;border-radius:13px;padding:15px;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:17px;letter-spacing:0.1em;cursor:pointer}
.btn-red:disabled{background:#1C1C2E;color:#6A6A85;cursor:not-allowed}
.inp{width:100%;background:#13131E;border:1px solid #303050;border-radius:12px;color:#F0EDE6;padding:14px 16px;font-size:16px;outline:none}
.lbl{font-size:10px;color:#9A9AB0;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:8px;display:block}
.toast{position:fixed;top:68px;left:50%;transform:translateX(-50%);background:#22C55E;color:#fff;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:600;z-index:600;white-space:nowrap;pointer-events:none}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);z-index:500;display:flex;align-items:flex-end;justify-content:center}
.sheet{background:#1C1C24;border-radius:22px 22px 0 0;padding:24px 20px 32px;width:100%;max-width:430px;max-height:88vh;overflow-y:auto;border-top:1px solid #2E2E3E}
.opt-btn{width:100%;background:#13131E;border:2px solid #2A2A3E;border-radius:13px;padding:10px 14px;color:#F0EDE6;font-family:'Barlow',sans-serif;font-size:15px;font-weight:600;text-align:left;cursor:pointer;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
.opt-btn.sel{background:#22C55E18;border-color:#22C55E;color:#22C55E}
input::placeholder,textarea::placeholder{color:#5A5A75}
select option{background:#13131E}
</style>
</head>
<body>
<div id="app">

<!-- LOGIN -->
<div id="s-login" class="screen active" style="align-items:center;justify-content:flex-start;padding:32px 28px 60px;overflow-y:auto;-webkit-overflow-scrolling:touch">
  <div style="margin-bottom:44px;text-align:center">
